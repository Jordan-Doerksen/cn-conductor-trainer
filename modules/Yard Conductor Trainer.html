<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yard Conductor Trainer</title>
<style>
  :root{
    --bg:#0e1622; --bg2:#13202f; --card:#18293c; --card2:#1b2c40;
    --line:#2b3f56; --ink:#e8eef6; --muted:#93a6bd;
    --yellow:#f5b301; --yellow-d:#caa000;
    --green:#33c27f; --green-bg:#123326;
    --red:#ef5a5a; --red-bg:#3a1717;
    --blue:#4aa3ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:linear-gradient(180deg,#0c1320,#0e1622 40%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; line-height:1.5;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 60px}
  header.top{
    display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);
    padding-bottom:14px;margin-bottom:8px;
  }
  .badge{
    width:40px;height:40px;border-radius:9px;flex:none;
    background:var(--yellow);color:#1a1206;font-weight:800;display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 2px 10px rgba(245,179,1,.25)
  }
  .title{font-size:18px;font-weight:700;letter-spacing:.3px}
  .subtitle{font-size:12.5px;color:var(--muted);margin-top:1px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-top:16px;
    box-shadow:0 8px 30px rgba(0,0,0,.25)}
  h1{font-size:22px;margin:2px 0 6px}
  h2{font-size:16px;margin:0 0 10px}
  p.lead{color:var(--muted);margin:0 0 16px;font-size:14.5px}
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  @media(max-width:560px){.menu-grid{grid-template-columns:1fr}}
  .tile{
    text-align:left;background:var(--card2,#1b2c40);border:1px solid var(--line);color:var(--ink);
    border-radius:12px;padding:14px 15px;cursor:pointer;transition:.12s;font:inherit
  }
  .tile:hover{border-color:var(--yellow);transform:translateY(-1px)}
  .tile .t{font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center}
  .tile .d{color:var(--muted);font-size:12.5px;margin-top:4px}
  .pill{font-size:11px;color:#0c1320;background:var(--yellow);border-radius:20px;padding:2px 8px;font-weight:700}
  .tile.mixed{grid-column:1/-1;background:#1b2c40;border-color:var(--yellow-d)}
  .soon{opacity:.55;cursor:not-allowed}
  .soon:hover{border-color:var(--line);transform:none}

  .hud{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px;color:var(--muted)}
  .hud b{color:var(--ink)}
  .bar{height:7px;background:#0c1622;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin:6px 0 16px}
  .bar > i{display:block;height:100%;background:var(--yellow);width:0;transition:width .25s}

  .qdomain{display:inline-block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--yellow);
    border:1px solid var(--yellow-d);border-radius:20px;padding:2px 10px;margin-bottom:10px}
  .qtext{font-size:17px;font-weight:600;margin:0 0 16px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    text-align:left;background:#15263a;border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:13px 15px;cursor:pointer;font:inherit;font-size:14.5px;transition:.1s;
    display:flex;gap:10px;align-items:flex-start
  }
  .opt:hover:not(:disabled){border-color:var(--blue)}
  .opt:disabled{cursor:default}
  .opt .k{font-weight:800;color:var(--muted);flex:none;width:18px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}

  .fb{margin-top:16px;border-radius:11px;padding:14px 15px;border:1px solid var(--line);display:none}
  .fb.show{display:block}
  .fb .verdict{font-weight:800;font-size:14px;margin-bottom:4px}
  .fb.ok .verdict{color:var(--green)}
  .fb.no .verdict{color:var(--red)}
  .fb .rule{font-size:12px;color:var(--yellow);font-weight:700;letter-spacing:.3px;margin-bottom:6px}
  .fb .why{font-size:13.5px;color:#cfdcec}

  .row{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
  button.cta{background:var(--yellow);color:#1a1206;border:none;border-radius:10px;padding:11px 20px;
    font-weight:800;font-size:14.5px;cursor:pointer;transition:.12s}
  button.cta:hover{background:#ffc21f}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:10px;
    padding:11px 16px;font-weight:600;cursor:pointer;font-size:13.5px}
  button.ghost:hover{color:var(--ink);border-color:var(--muted)}

  .big{font-size:44px;font-weight:800;letter-spacing:.5px}
  .scoreline{color:var(--muted);font-size:14px;margin-top:2px}
  .miss{border-top:1px solid var(--line);padding:13px 0;font-size:13.5px}
  .miss .mq{font-weight:600;margin-bottom:4px}
  .miss .ma{color:var(--green)}
  .miss .mr{color:var(--yellow);font-size:12px;font-weight:700;margin-top:3px}
  .encourage{background:#13261d;border:1px solid #1f6b46;color:#bdebcf;border-radius:11px;padding:12px 14px;font-size:13.5px;margin-top:14px}
  .foot{color:#56708a;font-size:11.5px;text-align:center;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" style="display:inline-block;color:#9fb2c9;text-decoration:none;font-size:13px;margin:0 0 10px">&larr; All modules</a>
  <header class="top">
    <div class="badge">CN</div>
    <div>
      <div class="title">Yard Conductor Trainer</div>
      <div class="subtitle">CROR drills &middot; switch lists &middot; yard switching &middot; Jan 2025 rules</div>
    </div>
  </header>
  <div id="app"></div>
  <div class="foot">Phase 1 &mdash; Rule Drills. Verified against the January 2025 Canadian Rail Operating Rules. Training aid only; the official CROR governs.</div>
</div>

<script>
/* ============ QUESTION BANK (verified vs. Jan 2025 CROR) ============ */
const DOMAINS = {
  switchlist:{name:"Switch Lists", blurb:"Read the list, build in order"},
  rules:{name:"CROR Rules", blurb:"Definitions & restrictions"},
  moves:{name:"Switching Moves", blurb:"Couple, kick, shove, secure"},
  radio:{name:"Radio & Signals", blurb:"Communicate the move"}
};

const BANK = [
  /* ---------- SWITCHING MOVES ---------- */
  {d:"moves",
   q:"You're leaving 8 cars unattended in a yard — about 1,800 trailing tons — on a 1.0% grade. Using the Rule 112(g) table, what's the minimum number of hand brakes?",
   opts:["4","6","8","2"], a:1, rule:"Rule 112(g)",
   why:"For 0–2000 trailing tons at a grade of ≤1.0%, the table requires 6 hand brakes — then test them for effectiveness."},
  {d:"moves",
   q:"A single car is left unattended. What does Rule 112(g) require?",
   opts:["Nothing if the track is flat","The hand brake applied and tested for effectiveness","Exactly two hand brakes","Air brakes only"], a:1, rule:"Rule 112(g)",
   why:"“A single piece of equipment must always be left with the hand brake applied and tested for effectiveness.”"},
  {d:"moves",
   q:"How do you test hand-brake effectiveness under Rule 112?",
   opts:["Pull with full throttle and watch the brakes","Release all air brakes, then let the slack adjust or apply tractive effort to confirm it won't move","Count that you applied enough brakes","Set the air and walk away"], a:1, rule:"Rule 112(vi)",
   why:"With all air brakes released, either let the slack run in/out or apply tractive effort — it must be apparent the hand brakes alone hold the equipment."},
  {d:"moves",
   q:"On which track are kicking, running switch, and gravity drop flatly PROHIBITED?",
   opts:["A yard switching lead","A siding","A designated kicking track","A flat classification track"], a:1, rule:"Rule 113.4",
   why:"113.4 prohibits them on main track, subdivision track, a siding, high-risk locations, shop tracks, and onto/with passenger equipment."},
  {d:"moves",
   q:"What's the minimum number of employees required to perform a running switch?",
   opts:["2","3","4","1"], a:1, rule:"Rule 113.6(c)",
   why:"At least 3 employees must be used when performing a running switch."},
  {d:"moves",
   q:"Before coupling to equipment, Rule 113.0 requires that…",
   opts:["Both knuckles are open","At least one knuckle is open","The air brakes are released","A blue flag is displayed"], a:1, rule:"Rule 113.0(c)",
   why:"Ensure at least one knuckle is open before coupling — otherwise you get a missed (by-pass) coupling."},
  {d:"moves",
   q:"Coupling must be made at the lowest speed necessary and must not exceed…",
   opts:["4 MPH","6 MPH","10 MPH","2 MPH"], a:1, rule:"Rule 113.0(h)",
   why:"Couple at ≤6 MPH. (Coupling to passenger equipment is stricter: stop 6–12 ft out and don't exceed 2 MPH.)"},
  {d:"moves",
   q:"You're shoving a cut and can't see the track ahead. What does Rule 115 require?",
   opts:["Sound the whistle and keep going","A crew member on the leading piece or on the ground, positioned to observe the track and control the move","Shove at 15 MPH maximum","Nothing, as long as you're on non-main track"], a:1, rule:"Rule 115(a)",
   why:"Point protection: a crew member must be on the leading end or on the ground to observe the track and give the signals needed to control the shove — unless the track is “known to be clear.”"},
  {d:"moves",
   q:"Operative air brakes (besides the locomotives) must be used when switching on a grade greater than — and with more than — ?",
   opts:["0.2% / 1000 tons","0.4% / 2000 tons","0.6% / 3000 tons","1.0% / 5000 tons"], a:1, rule:"Rule 113.3",
   why:"Air must be used when switching on a grade greater than 0.4% AND with more than 2000 tons."},
  {d:"moves",
   q:"In a yard, before uncoupling from standing equipment, Rule 113.1 requires…",
   opts:["Nothing","A sufficient number of hand brakes applied (or a Rule 112(c) securement method)","The air set and angle cock closed","An RTC clearance"], a:1, rule:"Rule 113.1(b)",
   why:"Before uncoupling from standing equipment in a yard, apply a sufficient number of hand brakes unless one of the Rule 112(c) methods is used — so it doesn't roll."},

  /* ---------- CROR RULES ---------- */
  {d:"rules",
   q:"Unless special instructions say otherwise, the normal position of a main track hand operated switch is…",
   opts:["For the siding","For the main track route","Reverse","Either, as convenient"], a:1, rule:"Rule 104(h)",
   why:"Normal is set for the main track route, and main track switches must be left lined and locked in normal position."},
  {d:"rules",
   q:"You must NOT turn a switch while any part of a car or engine is…",
   opts:["On the main track","Between the switch points and the fouling point of the track to be used","Coupled to a locomotive","Within 20 feet of the stand"], a:1, rule:"Rule 104(c)",
   why:"Never throw a switch under equipment between the points and the fouling point (except a running switch or the Rule 114 exception) — you can derail it or split the switch."},
  {d:"rules",
   q:"When using a crossover, which switch do you reverse FIRST?",
   opts:["Either one","The switch in the track the movement is standing on","The far switch","Both at the same time"], a:1, rule:"Rule 104(n)",
   why:"Reverse the switch you're standing on first; both switches must be reversed before crossing; and the movement must be clear before either is restored."},
  {d:"rules",
   q:"A derail (other than a Special or Blue Flag derail) must be left in what position?",
   opts:["Non-derailing","The derailing position, secured with a lock","Removed","Either is fine"], a:1, rule:"Rule 104.5(c),(e)",
   why:"Leave it in the derailing position and secured with a locking device — that's its whole job: stop a runaway."},
  {d:"rules",
   q:"Approaching a derail that's set in the derailing position, a movement must…",
   opts:["Proceed at restricted speed over it","Stop short of it","Line it through and continue","Radio the RTC for permission"], a:1, rule:"Rule 104.5(b)",
   why:"A movement or track unit must stop short of a derail set in the derailing position."},
  {d:"rules",
   q:"Unless otherwise provided, movements on non-main track operate at REDUCED speed and must not exceed…",
   opts:["10 MPH","15 MPH","20 MPH","25 MPH"], a:1, rule:"Rule 105(b)",
   why:"Non-main track: REDUCED speed, and not exceeding 15 MPH unless signal indication or special instructions allow more."},
  {d:"rules",
   q:"When a movement diverges from a main track, the switch must not be restored to normal until…",
   opts:["The RTC authorizes it","The fouling point has been cleared","The train has fully stopped","The next signal is reached"], a:1, rule:"Rule 104(m)",
   why:"Don't restore the switch until the fouling point is cleared — restoring early can catch and derail the rear of your movement."},
  {d:"rules",
   q:"A blue flag (and blue light at night) displayed on equipment means…",
   opts:["The track is out of service","Workmen are in the vicinity — the equipment must not be coupled to or moved","A derail is set ahead","Restricted speed required"], a:1, rule:"Rule 26",
   why:"Blue signal protection: workmen are about the equipment. It must not be coupled to or moved until they remove the signal."},
  {d:"rules",
   q:"Except when switching, when passing over a main track switch, employees must keep at least how far from the switch stand?",
   opts:["10 feet","20 feet","6 feet","50 feet"], a:1, rule:"Rule 104(j)",
   why:"Stay at least 20 feet from the switch stand (and on single track, on the opposite side when practicable)."},

  /* ---------- RADIO & SIGNALS ---------- */
  {d:"radio",
   q:"A hand or lantern signal swung in a circle, at right angle to the track, means…",
   opts:["Stop","Move backward","Move forward","Reduce speed"], a:1, rule:"Rule 12(a)(ii)",
   why:"Swung in a circle at right angle to the track = MOVE BACKWARD (speed proportional to how fast it's swung)."},
  {d:"radio",
   q:"A signal swung from side to side, at right angle to the track, means…",
   opts:["Stop","Move forward","Move backward","Apply air"], a:0, rule:"Rule 12(a)(i)",
   why:"Side to side at right angle to the track = STOP."},
  {d:"radio",
   q:"A signal raised and lowered means…",
   opts:["Move forward","Move backward","Reduce speed","Release air"], a:0, rule:"Rule 12(a)(iii)",
   why:"Raised and lowered (speed proportional) = MOVE FORWARD."},
  {d:"radio",
   q:"A signal held horizontally at arm's length means…",
   opts:["Reduce speed","Stop","Apply air brakes","Release air brakes"], a:0, rule:"Rule 12(a)(vi)",
   why:"Held horizontally at arm's length = REDUCE SPEED."},
  {d:"radio",
   q:"If there is any doubt as to the meaning of a signal, or for whom it is intended, it must be regarded as…",
   opts:["A proceed signal","A stop signal","A reduce-speed signal","Nothing — ignore it"], a:1, rule:"Rule 12(c)",
   why:"Doubt = STOP. Same principle applies on the radio (123.2(v))."},
  {d:"radio",
   q:"“Move forward” and “move backward” signals are always given in relation to…",
   opts:["The direction of travel","The front of the controlling locomotive","Compass north","Where the conductor is standing"], a:1, rule:"Rule 12(b) / 123.2(i)",
   why:"Direction is referenced to the front of the controlling locomotive — on radio it must be stated in the initial instruction and whenever it changes."},
  {d:"radio",
   q:"Switching by radio: you've traveled half the distance of the last instruction and hear nothing further. You must…",
   opts:["Continue at the same speed","Stop","Repeat the call and keep moving","Reduce to restricted speed"], a:1, rule:"Rule 123.2(iii)",
   why:"At half the distance of the last instruction with no further communication, STOP. Distance is given with every transmission."},
  {d:"radio",
   q:"When car lengths are used to communicate distance on the radio, unless otherwise arranged, one car length equals…",
   opts:["40 feet","50 feet","60 feet","The actual length of that car"], a:1, rule:"Rule 123.2(vi)",
   why:"Unless otherwise arranged, a car length means 50 feet."},
  {d:"radio",
   q:"Under Rule 121, the person initiating a radio call ends the INITIAL call with the word…",
   opts:["OUT","OVER","COPY","STANDBY"], a:1, rule:"Rule 121(b)",
   why:"The initiator ends the initial call with “OVER.” Each party ends their FINAL transmission with “OUT” (121(c)). The call also starts with the railway initials of the person being called."},
  {d:"radio",
   q:"Moving under hand signals, the person or the light giving the signals disappears from view. This must be regarded as…",
   opts:["Permission to continue","A stop signal","A reduce-speed signal","An apply-air signal"], a:1, rule:"Rule 12(e)",
   why:"Loss of sight of the signaller or the signal lights = STOP. Never keep moving blind."},

  /* ---------- SWITCH LISTS (job literacy; full interactive reader = Phase 2) ---------- */
  {d:"switchlist",
   q:"A switch list tells you, for each car, its reporting marks/number plus…",
   opts:["The locomotive type","The track it's destined to (and usually its standing order)","The weather forecast","The RTC's name"], a:1, rule:"Job knowledge",
   why:"The list is your work order: car ID, the track/block it goes to, and the order to handle them. Everything else in the yard wraps around getting this right."},
  {d:"switchlist",
   q:"Building an outbound train to a switch list, cars are generally arranged in the order they will be…",
   opts:["Loaded","Set off down the line","Weighed","Inspected"], a:1, rule:"Job knowledge",
   why:"Blocks are built in station/setting-off order so the first stop's cars are accessible first — saves re-handling on the road."},
  {d:"switchlist",
   q:"A car's tonnage and the track grade on your list matter most directly for which rule?",
   opts:["Hand signals","Securement — the Rule 112 hand-brake count","Blue flag","Whistle signals"], a:1, rule:"Rule 112(g)",
   why:"Trailing tonnage + grade drive how many hand brakes you must apply when leaving the cut. Read it off the list, find it on the table."},
  {d:"switchlist",
   q:"Your switch list shows a car placarded for dangerous goods. Which move is prohibited onto it?",
   opts:["Coupling","A running switch","Inspection","Spotting it at the dock"], a:1, rule:"Rule 113.6(b)(ii)",
   why:"No running switch with or onto placarded dangerous-goods equipment (and kicking such equipment is restricted too). Handle it under control."}
];

/* ============ ENGINE ============ */
const app = document.getElementById('app');
let state = null;

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function menu(){
  state=null;
  const counts={};Object.keys(DOMAINS).forEach(k=>counts[k]=BANK.filter(q=>q.d===k).length);
  let tiles="";
  for(const k of Object.keys(DOMAINS)){
    tiles+=`<button class="tile" onclick="start('${k}')">
      <div class="t">${DOMAINS[k].name}<span class="pill">${counts[k]} Q</span></div>
      <div class="d">${DOMAINS[k].blurb}</div></button>`;
  }
  app.innerHTML=`
    <div class="card">
      <h1>Get your reps in.</h1>
      <p class="lead">Every question is built from the January 2025 CROR, and every answer tells you the rule and the why. Pick a focus, or hit Mixed and run the whole yard. You can't break anything here — that's the point.</p>
      <div class="menu-grid">
        ${tiles}
        <button class="tile mixed" onclick="start('mixed')">
          <div class="t">Mixed — Full Yard<span class="pill">${BANK.length} Q</span></div>
          <div class="d">All four domains, shuffled. This is the one to beat.</div></button>
        <button class="tile soon" disabled>
          <div class="t">Switch List Reader</div>
          <div class="d">Interactive list + yard diagram — Phase 2</div></button>
        <button class="tile soon" disabled>
          <div class="t">Yard Switching Sim</div>
          <div class="d">Line switches, build trains, live rules referee — Phase 3</div></button>
      </div>
    </div>`;
}

function start(domain){
  const pool = domain==='mixed'?BANK:BANK.filter(q=>q.d===domain);
  state={domain, list:shuffle(pool), i:0, score:0, streak:0, best:0, missed:[], answered:false};
  question();
}

function question(){
  const q=state.list[state.i];
  state.answered=false;
  const pct=Math.round((state.i/state.list.length)*100);
  // build shuffled options carrying the correct flag
  const opts=shuffle(q.opts.map((t,idx)=>({t,correct:idx===q.a})));
  state._opts=opts;
  let optHtml="";
  const keys=["A","B","C","D","E"];
  opts.forEach((o,idx)=>{
    optHtml+=`<button class="opt" id="opt${idx}" onclick="choose(${idx})">
      <span class="k">${keys[idx]}</span><span>${o.t}</span></button>`;
  });
  app.innerHTML=`
    <div class="card">
      <div class="hud">
        <span>Question <b>${state.i+1}</b> / ${state.list.length}</span>
        <span>Score <b>${state.score}</b> &nbsp;&middot;&nbsp; Streak <b>${state.streak}</b></span>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="qdomain">${DOMAINS[q.d]?DOMAINS[q.d].name:'Switch Lists'}</div>
      <div class="qtext">${q.q}</div>
      <div class="opts">${optHtml}</div>
      <div class="fb" id="fb">
        <div class="verdict" id="verdict"></div>
        <div class="rule" id="rule"></div>
        <div class="why" id="why"></div>
      </div>
      <div class="row">
        <button class="ghost" onclick="menu()">Quit to menu</button>
        <button class="cta" id="next" style="display:none" onclick="next()">Next</button>
      </div>
    </div>`;
}

function choose(idx){
  if(state.answered)return;
  state.answered=true;
  const q=state.list[state.i];
  const opts=state._opts;
  const chosen=opts[idx];
  const correctIdx=opts.findIndex(o=>o.correct);
  document.querySelectorAll('.opt').forEach((b,bi)=>{
    b.disabled=true;
    if(bi===correctIdx)b.classList.add('correct');
    if(bi===idx && !chosen.correct)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  const verdict=document.getElementById('verdict');
  if(chosen.correct){
    state.score++; state.streak++; state.best=Math.max(state.best,state.streak);
    fb.className="fb show ok"; verdict.textContent="Correct — that's the move.";
  }else{
    state.streak=0;
    fb.className="fb show no"; verdict.textContent="Not quite. Here's the rule:";
    state.missed.push({q:q.q, your:chosen.t, correct:opts[correctIdx].t, rule:q.rule, why:q.why});
  }
  document.getElementById('rule').textContent=q.rule;
  document.getElementById('why').textContent=q.why;
  document.getElementById('next').style.display="inline-block";
  document.getElementById('next').textContent = (state.i===state.list.length-1)?"See results":"Next";
}

function next(){
  state.i++;
  if(state.i>=state.list.length)return results();
  question();
}

function results(){
  const total=state.list.length, score=state.score;
  const pct=Math.round((score/total)*100);
  let msg;
  if(pct===100)msg="Perfect run. That's a conductor who's ready. Do it again on Mixed to make it stick.";
  else if(pct>=80)msg="Strong. You're closing in — clean up the misses below and run it again.";
  else if(pct>=60)msg="Solid base. The misses below are exactly where your reps should go next.";
  else msg="This is the work paying off already — you just found precisely what to study. Re-run it; the score will climb.";
  let missHtml="";
  if(state.missed.length){
    missHtml=`<h2 style="margin-top:22px">Review your misses (${state.missed.length})</h2>`;
    state.missed.forEach(m=>{
      missHtml+=`<div class="miss">
        <div class="mq">${m.q}</div>
        <div class="ma">Correct: ${m.correct}</div>
        <div class="mr">${m.rule}</div>
        <div class="why" style="color:#cfdcec;margin-top:4px">${m.why}</div>
      </div>`;
    });
  }else{
    missHtml=`<div class="encourage">No misses. Clean sheet — lock it in by running Mixed next.</div>`;
  }
  app.innerHTML=`
    <div class="card">
      <div class="big">${pct}%</div>
      <div class="scoreline">${score} of ${total} correct &nbsp;&middot;&nbsp; best streak ${state.best}</div>
      <div class="encourage">${msg}</div>
      ${missHtml}
      <div class="row">
        <button class="ghost" onclick="menu()">Menu</button>
        <button class="cta" onclick="start('${state.domain}')">Run it again</button>
      </div>
    </div>`;
}

menu();
</script>
